services:
  - type: web
    name: fridgemate-backend
    env: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false 
      - key: TORCH_FORCE_WEIGHTS_ONLY_LOAD
        value: "0"

